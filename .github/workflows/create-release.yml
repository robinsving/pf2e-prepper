name: CREATE RELEASE

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: "Release type (auto determines from conventional commits)"
        required: false
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: auto
      dry-run:
        description: "Run without pushing commit/tag"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Create release commit and tag
    runs-on: ubuntu-latest
    steps:
      - name: Ensure workflow runs from main
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "This workflow must run from main to trigger the publish workflow."
            exit 1
          fi

      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and generate changelog
        id: version_bump
        run: |
          if [ "${{ github.event.inputs.release-type }}" = "auto" ]; then
            RELEASE_ARG=""
          else
            RELEASE_ARG="--release-as ${{ github.event.inputs.release-type }}"
          fi

          npx commit-and-tag-version \
            $RELEASE_ARG \
            --skip.changelog=false \
            --packageFiles package.json \
            --packageFiles module.json \
            --bumpFiles package.json \
            --bumpFiles package-lock.json \
            --bumpFiles module.json

          NEW_TAG=$(git describe --tags --abbrev=0)
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Created tag: $NEW_TAG"

      - name: Verify module version matches tag
        run: |
          TAG_VERSION="${{ steps.version_bump.outputs.tag }}"
          MODULE_VERSION=$(jq -r '.version' module.json)
          if [ "v$MODULE_VERSION" != "$TAG_VERSION" ]; then
            echo "module.json version ($MODULE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Push release commit and tag
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin ${{ steps.version_bump.outputs.tag }}
