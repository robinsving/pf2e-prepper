name: Release

on:
  workflow_call:
    inputs:
      release-type:
        description: 'Release type (auto will determine from commits)'
        required: false
        type: string
        default: 'auto'
      dry-run:
        description: 'Run in dry-run mode (no pushes or releases created)'
        required: false
        type: boolean
        default: false
    secrets:
      KAMBI_GH_ACTIONS_BOT_APP_ID:
        required: true
      KAMBI_GH_ACTIONS_BOT_PRIVATE_KEY:
        required: true

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.KAMBI_GH_ACTIONS_BOT_APP_ID }}
          private-key: ${{ secrets.KAMBI_GH_ACTIONS_BOT_PRIVATE_KEY }}

      - name: Check out
        uses: actions/checkout@v6
        with:
          token: '${{ steps.generate_token.outputs.token }}'
          fetch-depth: 0  # Fetch all history for changelog generation
          fetch-tags: true  # Explicitly fetch all tags

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g commit-and-tag-version

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@kambi.github.com"

      - name: Get latest tag for verification
        id: get_tag
        run: |
          # Ensure we have all tags
          git fetch --tags --force
          # Get the highest semantic version tag
          LATEST_TAG=$(git tag -l "v*.*.*" | sort -V | tail -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "latest=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Run version bump and generate changelog
        id: version_bump
        run: |
          # Determine release type argument
          if [ "${{ inputs.release-type }}" = "auto" ]; then
            RELEASE_ARG=""
          else
            RELEASE_ARG="--release-as ${{ inputs.release-type }}"
          fi

          # Run commit-and-tag-version
          # This will: analyze commits, bump version, update CHANGELOG.md, create commit, and create tag locally
          commit-and-tag-version $RELEASE_ARG --no-tag

          # Get the new version from the tag that was just created
          NEW_TAG=$(git describe --tags --abbrev=0)

          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "New version: $NEW_TAG (was ${{ steps.get_tag.outputs.latest }})"

      - name: Push commit
        if: ${{ !inputs.dry-run }}
        run: |
          git push origin HEAD:${{ github.ref_name }}

      - name: Extract major version
        id: version
        run: |
          VERSION=${{ steps.version_bump.outputs.tag }}
          MAJOR_VERSION=$(echo $VERSION | sed -E 's/^v?([0-9]+)\..*/v\1/')
          echo "major=$MAJOR_VERSION" >> $GITHUB_OUTPUT

      - name: Update major version tag
        if: ${{ !inputs.dry-run }}
        run: |
          git tag -f ${{ steps.version.outputs.major }}
          git push -f origin ${{ steps.version.outputs.major }}

      - name: Extract release notes
        id: release_notes
        run: |
          # Extract the latest release notes from CHANGELOG.md (between first two headers)
          NEW_TAG="${{ steps.version_bump.outputs.tag }}"

          # Get content between the first heading and the second heading
          awk '/^## /{if(++count==2) exit} count==1 && !/^## /' CHANGELOG.md > RELEASE_NOTES.md

          echo "Release notes for $NEW_TAG:"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        if: ${{ !inputs.dry-run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_bump.outputs.tag }}
          name: Release ${{ steps.version_bump.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
